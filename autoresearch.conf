[program:autoresearch]
directory=/home/ubuntu/autoresearch
command=/home/ubuntu/.local/bin/uv run daemon.py
autostart=true
autorestart=true
stderr_logfile=/var/log/autoresearch.err.log
stdout_logfile=/var/log/autoresearch.out.log
user=ubuntu
environment=GOOGLE_API_KEY="",GEMINI_API_KEY="",TELEGRAM_BOT_TOKEN="",TELEGRAM_CHAT_ID="",PYTHONUNBUFFERED="1",GEMINI_MODEL="gemini-2.0-flash-lite",TZ="America/Mexico_City"
